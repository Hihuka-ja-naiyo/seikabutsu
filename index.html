<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>映画『グループ活動』公式サイト</title>
<style>
body{ margin:0; background:url("background.jpg") center/cover fixed no-repeat; color:white; font-family:"Yu Mincho",serif; overflow-x:hidden; }
header{ position:fixed; width:100%; top:0; background:rgba(0,0,0,0.85); display:flex; justify-content:space-between; align-items:center; padding:15px 5%; z-index:1000; box-sizing:border-box; }
.logo{ font-size:16px; letter-spacing:2px; }
header nav{ display:flex; gap:20px; }
header a{ color:white; text-decoration:none; font-size:14px; }
header a:hover{ color:red; }
section{ padding:120px 15%; border-bottom:1px solid #1c1c1c; }
.hero{ height:100vh; background:url("main.jpg") center/cover no-repeat; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }
.hero h1{ font-size:70px; letter-spacing:12px; }
#story{ background:linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.8)), url("story_bg.jpg") center/cover no-repeat; }
#cast{ background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.85)), url("cast_bg.jpg") center/cover no-repeat; }
.cast-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:30px; }
.cast{ background:#111; padding:30px; text-align:center; }
#staff{ background:linear-gradient(rgba(50,0,0,0.8),rgba(0,0,0,0.9)), url("staff_bg.jpg") center/cover no-repeat; }
#staff p{ margin:20px 0; font-size:18px; }
footer{ padding:80px; text-align:center; font-size:13px; background:rgba(0,0,0,0.8); }
#noiseOverlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif"); opacity:0; pointer-events:none; mix-blend-mode:screen; z-index:9500; }
#nandeOverlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:none; overflow:hidden; z-index:9000; }
.nande{ position:absolute; color:red; font-size:40px; font-weight:bold; }
#scaryOverlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:none; justify-content:center; align-items:center; z-index:9999; }
#scaryOverlay img{ width:100%; height:100%; object-fit:cover; }
.blood{ background:black !important; color:#ff2a2a; filter:contrast(120%) brightness(70%); }
.blood .hero{ background:black !important; }
#handOverlay{ position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50; }
.bloodHand{ position:absolute; opacity:0; animation:handAppear 2s forwards; mix-blend-mode:multiply; }
@keyframes handAppear{ 0%{opacity:0;transform:scale(0.7)} 100%{opacity:0.95;transform:scale(1)} }
.glitchText{ animation:glitch 0.2s infinite; }
@keyframes glitch{ 0%{transform:translate(2px,-2px)} 50%{transform:translate(-2px,2px)} 100%{transform:translate(0)} }
</style>
</head>
<body>

<div id="startOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;">
  <h1 style="font-size: 50px; letter-spacing: 5px;">グループ活動</h1>
  <p>クリックして開始</p>
</div>

<header><div class="logo">グループ活動</div><nav><a href="#story">STORY</a><a href="#cast">CAST</a><a href="#staff">STAFF</a></nav></header>
<section class="hero"><h1>グループ活動</h1><p>6人で始まった、はずだった。</p></section>
<section id="story"><h2>STORY</h2><p>とある授業で結成された6人のグループ。</p><p>だが発表当日、教室に集まったのは5人。</p><p>担任は言う。「最初から5人だろ？」</p><p>それでも全員覚えている。確かに“もう一人”いた。</p><p>放課後、黒板に浮かぶ赤い文字。「なんで」</p></section>
<section id="cast"><h2>CAST</h2><div class="cast-grid"><div class="cast">生徒A</div><div class="cast">生徒B</div><div class="cast">生徒C</div><div class="cast">生徒D</div><div class="cast">生徒E</div><div class="cast">？？？</div></div></section>
<section id="staff"><h2>STAFF</h2><p>監督：尾〇遥〇〇</p><p>脚本：〇池夢〇</p><p>撮影：白〇千〇</p><p>美術：〇施〇</p><p>音楽：中〇〇</p></section>
<footer>© 2026 グループ活動製作委員会</footer>

<div id="noiseOverlay"></div>
<div id="nandeOverlay"></div>
<div id="scaryOverlay"><img src="scary.jpg"></div>
<div id="handOverlay"></div>

<audio id="noiseSound" src="noise.mp3" preload="auto"></audio>
<audio id="ambienceSound" src="ambience.mp3" loop preload="auto"></audio>
<audio id="scareSound" src="scare.mp3" preload="auto"></audio>
<audio id="droneSound" src="drone.mp3" loop preload="auto"></audio>
<audio id="afterSound" src="after_horror.mp3" loop preload="auto"></audio>

<script>
let triggered=false, noiseTriggered=false;

// クリック時にすべての音源を一度読み込ませることで再生許可を得る
document.getElementById("startOverlay").addEventListener("click", function() {
  this.style.display = "none";
  const allAudios = [document.getElementById("droneSound"), document.getElementById("afterSound"), document.getElementById("ambienceSound"), document.getElementById("scareSound"), document.getElementById("noiseSound")];
  allAudios.forEach(a => a.load());
  document.getElementById("droneSound").play();
});

window.addEventListener("scroll", function(){
  let scroll=window.scrollY, height=document.body.scrollHeight-window.innerHeight;
  if(!noiseTriggered && scroll>height*0.3){ noiseTriggered=true; triggerNoise(); }
  if(!triggered && scroll>=height-5){ triggered=true; setTimeout(startNandeEffect, 1000); }
});

function triggerNoise(){
  const noise=document.getElementById("noiseOverlay"), sound=document.getElementById("noiseSound");
  noise.style.opacity=0.4; sound.play();
  setTimeout(()=>{ sound.pause(); sound.currentTime=0; noise.style.opacity=0; }, 700);
}

function startNandeEffect(){
  document.getElementById("droneSound").pause();
  document.getElementById("ambienceSound").play();
  const overlay=document.getElementById("nandeOverlay");
  overlay.style.display="block";
  let count=0;
  let interval=setInterval(function(){
    let span=document.createElement("span");
    span.className="nande"; span.innerText="なんで";
    span.style.top=Math.random()*100+"%"; span.style.left=Math.random()*100+"%";
    span.style.fontSize=(30+Math.random()*60)+"px";
    span.style.transform="rotate("+(Math.random()*20-10)+"deg)";
    overlay.appendChild(span);
    count++;
    if(count>150){
      clearInterval(interval);
      setTimeout(function(){
        overlay.style.display="none";
        document.getElementById("ambienceSound").pause();
        document.getElementById("scaryOverlay").style.display="flex";
        document.getElementById("scareSound").play();
      }, 600);
      setTimeout(endHorrorSite, 3500);
    }
  }, 25);
}

function endHorrorSite(){
  document.getElementById("scaryOverlay").style.display="none";
  document.body.classList.add("blood");
  // 確実に afterSound を再生
  document.getElementById("afterSound").play();
  spawnBloodHands();
  corruptText();
}

function spawnBloodHands(){
  let handCount=0;
  const overlay=document.getElementById("handOverlay");
  let interval=setInterval(function(){
    if(handCount>=6){ clearInterval(interval); return; }
    let hand=document.createElement("img");
    hand.src="hand.png"; hand.className="bloodHand";
    hand.style.left=Math.random()*100+"vw"; hand.style.top=Math.random()*100+"vh";
    hand.style.transform="rotate("+Math.random()*360+"deg)";
    hand.style.width=(250+Math.random()*200)+"px";
    overlay.appendChild(hand);
    handCount++;
  }, 900);
}

function corruptText(){
  let texts=document.querySelectorAll("p,h1,h2,.cast");
  setInterval(function(){
    let target=texts[Math.floor(Math.random()*texts.length)];
    let original=target.innerText;
    target.innerText=original.split("").map(c=>Math.random()<0.35?"":c).join("");
    target.classList.add("glitchText");
    setTimeout(()=>{ target.innerText=original; target.classList.remove("glitchText"); }, 500);
  }, 900);
}
</script>
</body>
</html>
